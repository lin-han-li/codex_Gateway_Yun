map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream codex_gateway_backend {
  server 127.0.0.1:4777;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name gateway.example.com;

  # Force every client onto HTTPS so management APIs never stay on plain HTTP.
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name gateway.example.com;

  ssl_certificate /etc/letsencrypt/live/gateway.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gateway.example.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_prefer_server_ciphers off;

  access_log /var/log/nginx/codex-gateway.access.log;
  error_log /var/log/nginx/codex-gateway.error.log warn;

  client_max_body_size 25m;
  keepalive_timeout 65;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  proxy_request_buffering off;

  location = /api/events {
    proxy_pass http://codex_gateway_backend;
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    add_header X-Accel-Buffering no always;
  }

  location = /api/events/usage {
    proxy_pass http://codex_gateway_backend;
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    add_header X-Accel-Buffering no always;
  }

  location ^~ /v1/ {
    proxy_pass http://codex_gateway_backend;
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    add_header X-Accel-Buffering no always;
  }

  location / {
    proxy_pass http://codex_gateway_backend;
  }
}
